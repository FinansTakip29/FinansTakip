databases:
  - name: finans-takip-db
    databaseName: finans_takip
    user: finans_takip

services:
  - type: web
    name: finans-takip
    env: python
    buildCommand: bash build.sh
    startCommand: gunicorn FinansTakip.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: finans-takip-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: finanstakip-61ls.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://finanstakip-61ls.onrender.com
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: SECURE_SSL_REDIRECT
        value: "True"
